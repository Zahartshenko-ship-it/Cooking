<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Умный Шеф</title>
    <style>
        :root { --primary: #4CAF50; --bg: #f4f4f9; --text: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1, h2 { text-align: center; color: #2c3e50; }

                .dropdown-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .ingredient-select {
            flex-grow: 1;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        .btn-add {
            background-color: #f0f0f0;
            color: #333;
            border: 1px dashed #ccc;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 5px;
            font-size: 14px;
        }

        .btn-add:hover {
            background-color: #e4e4e4;
        }

        .btn-remove {
            background-color: #ff4d4d;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 15px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-remove:hover {
            background-color: #cc0000;
        }

        /* Поиск ингредиентов */
        .search-box { position: relative; max-width: 500px; margin: 20px auto; }
        input[type="text"] { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 25px; font-size: 16px; outline: none; box-sizing: border-box; }
        input[type="text"]:focus { border-color: var(--primary); }
        .suggestions { position: absolute; width: 100%; background: white; border: 1px solid #ddd; border-radius: 10px; max-height: 200px; overflow-y: auto; z-index: 10; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .suggestions div { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        .suggestions div:hover { background: #e8f5e9; }

        /* Холодильник */
        .fridge { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0; justify-content: center; min-height: 50px; }
        .fridge-item { background: var(--primary); color: white; padding: 8px 15px; border-radius: 20px; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .fridge-item span { cursor: pointer; font-weight: bold; }

        /* Кнопка */
        .btn-find { display: block; width: 200px; margin: 20px auto; padding: 15px; background: #2c3e50; color: white; border: none; border-radius: 25px; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .btn-find:hover { background: #34495e; transform: scale(1.05); }

        /* Результаты */
        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card h3 { margin-top: 0; color: var(--primary); }
        .tag { display: inline-block; background: #eee; padding: 4px 8px; border-radius: 5px; font-size: 12px; margin: 2px; }
        .missing { color: #e74c3c; font-size: 13px; margin-top: 10px; }
        .score { float: right; font-weight: bold; color: #2c3e50; }

        .section-title { border-bottom: 2px solid #ddd; padding-bottom: 10px; margin-top: 40px; }
        .loader { text-align: center; display: none; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1> Что приготовить?</h1>
    <p style="text-align: center; color: #666;">Выберите продукты, которые у вас есть в холодильнике</p>

    <div class="search-box">
        <label>Выберите ингредиенты</label>
        
        <div id="dropdownsContainer">
            <div class="dropdown-wrapper">
                <select class="ingredient-select" onchange="updateCount()">
                    <option value="" disabled selected>Выберите продукт...</option>
                    <option value="курица">Курица</option>
                    <option value="картофель">Картофель</option>
                    <option value="помидор">Помидор</option>
                    <option value="яйцо">Яйцо</option>
                    <option value="лук">Лук</option>
                    </select>
                </div>
        </div>

        <button class="btn-add" type="button" onclick="addDropdown()">+ Добавить еще продукт</button>
    </div>

    <div class="fridge" id="fridgeList"></div>
    
    <div style="text-align: center; color: #999; font-size: 13px;" id="countDisplay">Выбрано: 0</div>

    <button class="btn-find" onclick="findRecipes()">Найти рецепты</button>
    <div class="loader" id="loader">Ищем лучшие рецепты...</div>

    <div id="resultsArea">
        <h2 class="section-title"> Можно приготовить сразу</h2>
        <div class="results-grid" id="strictResults"></div>

        <h2 class="section-title"> Нужно докупить (1-2 продукта)</h2>
        <div class="results-grid" id="extraResults"></div>
    </div>
</div>

<script>
    let allIngredients = [];
    let myFridge = [];

    // 1. Загрузка списка ингредиентов при старте
    fetch('/api/ingredients')
        .then(res => res.json())
        .then(data => {
            allIngredients = data;
            console.log(`Загружено ${allIngredients.length} ингредиентов`);
        });

    // 2. Логика поиска (Автокомплит)
    const input = document.getElementById('ingredientInput');
    const suggestionsBox = document.getElementById('suggestionsBox');

    input.addEventListener('input', function() {
        const val = this.value.toLowerCase();
        suggestionsBox.innerHTML = '';
        if (!val) { suggestionsBox.style.display = 'none'; return; }

        // Фильтруем список (берем первые 10 совпадений)
        const matches = allIngredients.filter(ing => ing.includes(val)).slice(0, 10);

        if (matches.length > 0) {
            suggestionsBox.style.display = 'block';
            matches.forEach(match => {
                const div = document.createElement('div');
                // Заменяем _ на пробел для отображения
                div.textContent = match.replace(/_/g, ' ');
                div.onclick = () => {
                    addToFridge(match);
                    input.value = '';
                    suggestionsBox.style.display = 'none';
                };
                suggestionsBox.appendChild(div);
            });
        } else {
            suggestionsBox.style.display = 'none';
        }
    });

    // Скрыть подсказки при клике вне
    document.addEventListener('click', function(e) {
        if (e.target !== input) suggestionsBox.style.display = 'none';
    });

    // 3. Добавление в холодильник
    function addToFridge(ing) {
        if (!myFridge.includes(ing)) {
            myFridge.push(ing);
            renderFridge();
        }
    }

    function removeFromFridge(ing) {
        myFridge = myFridge.filter(i => i !== ing);
        renderFridge();
    }

    function renderFridge() {
        const container = document.getElementById('fridgeList');
        container.innerHTML = '';
        myFridge.forEach(ing => {
            const div = document.createElement('div');
            div.className = 'fridge-item';
            div.innerHTML = `${ing.replace(/_/g, ' ')} <span onclick="removeFromFridge('${ing}')">&times;</span>`;
            container.appendChild(div);
        });
        document.getElementById('countDisplay').textContent = `Выбрано: ${myFridge.length}`;
    }

    function addDropdown() {
    const container = document.getElementById('dropdownsContainer');
    
    // Находим первый выпадающий список на странице, чтобы скопировать его (вместе со всеми option)
    const originalSelect = container.querySelector('.ingredient-select');
    
    // Создаем обертку для нового списка и кнопки
    const wrapper = document.createElement('div');
    wrapper.className = 'dropdown-wrapper';

    // Клонируем список и сбрасываем его значение
    const newSelect = originalSelect.cloneNode(true);
    newSelect.selectedIndex = 0; // Возвращаем на "Выберите продукт..."
    newSelect.onchange = updateCount; // Привязываем пересчет

    // Создаем кнопку для удаления именно этой строки
    const removeBtn = document.createElement('button');
    removeBtn.className = 'btn-remove';
    removeBtn.type = 'button';
    removeBtn.innerHTML = '✖';
    removeBtn.onclick = function() {
        wrapper.remove();
        updateCount(); // Пересчитываем количество после удаления
    };

    // Собираем всё вместе и добавляем в контейнер
    wrapper.appendChild(newSelect);
    wrapper.appendChild(removeBtn);
    container.appendChild(wrapper);
}

// Пример функции подсчета (чтобы работал id="countDisplay")
function updateCount() {
    const selects = document.querySelectorAll('.ingredient-select');
    let count = 0;
    
    selects.forEach(select => {
        if (select.value) { // Если выбрано что-то кроме заглушки
            count++;
        }
    });
    
    document.getElementById('countDisplay').textContent = `Выбрано: ${count}`;
}

    // 4. Отправка запроса на бэкенд
    function findRecipes() {
        if (myFridge.length === 0) {
            alert("Выберите хотя бы один продукт!");
            return;
        }

        document.getElementById('loader').style.display = 'block';
        document.getElementById('strictResults').innerHTML = '';
        document.getElementById('extraResults').innerHTML = '';

        fetch('/api/recommend', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ products: myFridge })
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById('loader').style.display = 'none';
            renderCards('strictResults', data.strict, true);
            renderCards('extraResults', data.extras, false);
        })
        .catch(err => {
            console.error(err);
            document.getElementById('loader').style.display = 'none';
            alert("Ошибка при поиске рецептов");
        });
    }

    function renderCards(elementId, recipes, isStrict) {
        const container = document.getElementById(elementId);
        if (recipes.length === 0) {
            container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #999;">Ничего не найдено 😔</p>';
            return;
        }

        recipes.forEach(r => {
            const card = document.createElement('div');
            card.className = 'card';

            let ingredientsHtml = '';
            if (isStrict) {
                ingredientsHtml = `<p><small>${r.ingredients}</small></p>`;
            } else {
                ingredientsHtml = `<div class="missing"> Докупить: ${r.missing.join(', ')}</div>`;
            }

            card.innerHTML = `
                <h3>${r.name} <span class="score">${isStrict ? '100%' : Math.round(r.score*100) + '%'}</span></h3>
                ${ingredientsHtml}
                ${!isStrict ? `<p>Ваших продуктов: <b>${r.found_count}</b></p>` : ''}
            `;
            container.appendChild(card);
        });
    }
</script>

</body>
</html>
